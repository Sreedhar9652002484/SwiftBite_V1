version: '3.9'
services:
  # ? SQL Server
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: swiftbite-sql
    environment:
      SA_PASSWORD: "SwiftBite@2024!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

  # ? Redis
  redis:
    image: redis:7-alpine
    container_name: swiftbite-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ? RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: swiftbite-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  # ?? API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: src/SwiftBite.ApiGateway/Dockerfile
    container_name: swiftbite-gateway
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - Redis__ConnectionString=swiftbite-redis:6379
      - AuthServer__Authority=http://swiftbite-auth:5001
    depends_on:
      - redis
      - sqlserver
    restart: unless-stopped

volumes:
  sqlserver_data:
  redis_data:
  rabbitmq_data: