<div class="settings-page">

  <!-- Toasts -->
  <div class="toast success" *ngIf="successMsg()">✓ {{ successMsg() }}</div>
  <div class="toast error"   *ngIf="errorMsg()">✕ {{ errorMsg() }}</div>

  <!-- Header -->
  <div class="page-header">
    <div>
      <h1 class="page-title">Restaurant Settings</h1>
      <p class="page-sub">Update your restaurant's public profile</p>
    </div>
    <button
      class="btn-save"
      [disabled]="saving() || loading()"
      (click)="save()"
    >
      {{ saving() ? 'Saving…' : 'Save Changes' }}
    </button>
  </div>

  <!-- Loader -->
  <div class="loader-wrap" *ngIf="loading()">
    <div class="spinner"></div>
    <p>Loading settings…</p>
  </div>

  <div class="settings-body" *ngIf="!loading()">

    <!-- Section: Basic Info -->
    <div class="section-card">
      <h2 class="section-title">Basic information</h2>

      <div class="form-grid">
        <div class="field full">
          <label>Restaurant name *</label>
          <input [(ngModel)]="form.name" placeholder="e.g. Paradise Biryani" />
        </div>

        <div class="field full">
          <label>Description</label>
          <textarea
            [(ngModel)]="form.description"
            rows="3"
            placeholder="Tell customers what makes your restaurant special…"
          ></textarea>
        </div>

        <div class="field">
          <label>Cuisine type</label>
          <select [(ngModel)]="form.cuisineType">
            <option *ngFor="let c of cuisineTypes" [ngValue]="c.value">{{ c.label }}</option>
          </select>
        </div>

        <div class="field">
          <label>Phone number</label>
          <input [(ngModel)]="form.phoneNumber" placeholder="+91 9876543210" />
        </div>
      </div>
    </div>

    <!-- Section: Location -->
    <div class="section-card">
      <h2 class="section-title">Location</h2>

      <div class="form-grid">
        <div class="field full">
          <label>Address</label>
          <input [(ngModel)]="form.address" placeholder="Street address" />
        </div>

        <div class="field">
          <label>City</label>
          <input [(ngModel)]="form.city" placeholder="Hyderabad" />
        </div>

        <div class="field">
          <label>PIN code</label>
          <input [(ngModel)]="form.pinCode" placeholder="500001" maxlength="6" />
        </div>
      </div>
    </div>

    <!-- Section: Delivery -->
    <div class="section-card">
      <h2 class="section-title">Delivery settings</h2>

      <div class="form-grid">
        <div class="field">
          <label>Minimum order amount (₹)</label>
          <div class="input-prefix">
            <span class="prefix">₹</span>
            <input
              type="number"
              [(ngModel)]="form.minimumOrderAmount"
              min="0"
              placeholder="99"
            />
          </div>
        </div>

        <div class="field">
          <label>Average delivery time (minutes)</label>
          <div class="input-suffix">
            <input
              type="number"
              [(ngModel)]="form.averageDeliveryTimeMinutes"
              min="5"
              max="120"
              placeholder="30"
            />
            <span class="suffix">min</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Save button (bottom) -->
    <div class="bottom-actions">
      <button
        class="btn-save"
        [disabled]="saving() || loading()"
        (click)="save()"
      >
        {{ saving() ? 'Saving…' : 'Save Changes' }}
      </button>
    </div>

  </div>
</div>
